; SkyMPFixes plugin configuration
; --------------------------------------------------------------------
; This file lives next to SkyMPFixes.dll in
;   <Skyrim>\Data\SKSE\Plugins\
; Missing file, missing key, or value 0 -> the corresponding fix uses
; its own safe default and stays out of the way.
;
; Every setting that has an effect at runtime is also logged to
;   <Skyrim>\Data\SKSE\Plugins\SkyMPFixes.log
; so you can verify the applied value after launching the game.

[V8]
; Maximum size of the V8 (Node.js) JavaScript old-generation heap, in MB.
;
; V8 picks a default based on physical RAM, but the computed value is
; capped at ~4 GB on x64 regardless of how much RAM is installed.
; Long SkyMP sessions can grow the JS heap past that cap and trigger
;     FATAL ERROR: ... JavaScript heap out of memory
; which calls ExitProcess and ends the play session.
;
; Raise this to give long sessions more headroom.
; Typical values: 4096, 6144, 8192, 12288.
; Set to 0 (or remove the line) to leave V8's default in place.
MaxOldSpaceMB = 8192

[HangWatchdog]
; Watches the main game window with Windows' IsHungAppWindow. If the game
; stops responding for HangThresholdSec seconds continuously, take Action.
;
; The typical trigger is SkyrimPlatform's hook dispatcher waiting forever
; for a slow / stuck JS handler while the game's main thread is inside
; the hook. The proper fix lives in the SkyrimPlatform source; the
; watchdog here just makes sure you're not staring at a hung game.

; 0 disables the watchdog entirely. Default: 1
Enabled = 1

; How many seconds the window must be continuously unresponsive before
; we act. Minimum 5, maximum 3600. Default: 30
HangThresholdSec = 30

; What to do when the threshold is hit. Each option only fires once per
; hang episode; if the game recovers on its own, the counter resets.
;
;   log         -- just add a line to SkyMPFixes.log (non-destructive)
;   dump        -- write a full-memory mini-dump next to SkyMPFixes.log
;                  and keep running so you can decide when to close
;                  (default; the safest useful option)
;   kill        -- immediately TerminateProcess the game
;   dumpAndKill -- dump first, then kill
Action = dump
