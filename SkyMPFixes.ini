; SkyMPFixes plugin configuration
; --------------------------------------------------------------------
; This file lives next to SkyMPFixes.dll in
;   <Skyrim>\Data\SKSE\Plugins\
; Missing file, missing key, or value 0 -> the corresponding fix uses
; its own safe default and stays out of the way.
;
; Every setting that has an effect at runtime is also logged to
;   <Skyrim>\Data\SKSE\Plugins\SkyMPFixes.log
; so you can verify the applied value after launching the game.

[V8]
; Maximum size of the V8 (Node.js) JavaScript old-generation heap, in MB.
;
; V8 picks a default based on physical RAM, but the computed value is
; capped at ~4 GB on x64 regardless of how much RAM is installed.
; Long SkyMP sessions can grow the JS heap past that cap and trigger
;     FATAL ERROR: ... JavaScript heap out of memory
; which calls ExitProcess and ends the play session.
;
; Raise this to give long sessions more headroom.
; Typical values: 4096, 6144, 8192, 12288.
; Set to 0 (or remove the line) to leave V8's default in place.
MaxOldSpaceMB = 8192
