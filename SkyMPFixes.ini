; SkyMPFixes plugin configuration
; --------------------------------------------------------------------
; This file lives next to SkyMPFixes.dll in
;   <Skyrim>\Data\SKSE\Plugins\
; Missing file, missing key, or value 0 -> the corresponding fix uses
; its own safe default and stays out of the way.
;
; Every setting that has an effect at runtime is also logged to
;   <Skyrim>\Data\SKSE\Plugins\SkyMPFixes.log
; so you can verify the applied value after launching the game.

[V8]
; Maximum size of the V8 (Node.js) JavaScript old-generation heap, in MB.
;
; V8 picks a default based on physical RAM, but the computed value is
; capped at ~4 GB on x64 regardless of how much RAM is installed.
; Long SkyMP sessions can grow the JS heap past that cap and trigger
;     FATAL ERROR: ... JavaScript heap out of memory
; which calls ExitProcess and ends the play session.
;
; Raise this to give long sessions more headroom.
; Typical values: 4096, 6144, 8192, 12288.
; Set to 0 (or remove the line) to leave V8's default in place.
MaxOldSpaceMB = 8192

[HangWatchdog]
; Watches for two different kinds of hang and takes Action if either
; triggers. Each detector has its own threshold below; set either to 0
; to disable it. Both can run at the same time.
;
;   1. Window hang       (HangThresholdSec) -- uses Windows'
;      IsHungAppWindow. Catches total application freezes where the
;      game stops pumping messages entirely.
;
;   2. Game-loop hang    (HeartbeatStaleSec) -- reads a heartbeat file
;      that the optional memprofile.js plugin touches every SP update
;      tick. Catches freezes where the window still responds to
;      Windows but the game's own update loop is stuck (the typical
;      SkyrimPlatform hook deadlock, which IsHungAppWindow never
;      reports). No effect if memprofile.js is not installed.
;
; The proper fix for the SP hook deadlock lives in the SkyrimPlatform
; source; the watchdog here just makes sure you're not staring at a
; silently hung game.

; 0 disables the watchdog entirely (both detectors). Default: 1
Enabled = 1

; Detector 1: seconds the window must be continuously unresponsive
; (per IsHungAppWindow) before we act.
; 0 disables this detector. Minimum 5, maximum 3600. Default: 30
HangThresholdSec = 30

; Detector 2: seconds the game-loop heartbeat file may go stale before
; we treat it as a hang.
;
; memprofile.js (Data\Platform\Plugins\memprofile.js) touches
; Data\Platform\SkyMPFixes.heartbeat at most once per SP update tick.
; When the game loop stalls, that file stops being updated and its
; mtime ages past this threshold, triggering Action.
;
; If memprofile.js is not installed the file will never exist and
; this check silently does nothing -- no false positives.
;
; 0 disables this detector. Default: 10
HeartbeatStaleSec = 10

; Detector 3: seconds the main game thread may go without consuming
; measurable CPU time before we treat it as frozen.
;
; This detector does NOT require memprofile.js. It catches the specific
; SkyrimPlatform JS-thread-pool deadlock (confirmed in all 2026-07-12 and
; 2026-07-15 hang dumps): in that scenario the main game thread sits in
; NtWaitForAlertByThreadId consuming ~0 CPU while the window stays
; "Responding=True" (so IsHungAppWindow and Ctrl+Shift+F12 are both blind).
;
; Threshold of 30s is conservative enough to survive:
;  - Initial loading screen (main thread is idle during asset streaming)
;  - Very slow scenes / background tab (still consumes some CPU per frame)
;  - CrashLogger dump writing (brief pause, recovers within seconds)
;
; Set to 0 to disable. Minimum 10, maximum 3600. Default: 30
CpuStallSec = 30

; Before taking Action on a CPU stall, attempt to break the deadlock by
; sending NtAlertThreadByThreadId to every thread in the process.
;
; Analysis of all 2026-07-12/15 hang dumps shows the freeze is caused by a
; "lost wakeup" in SkyrimPlatform's JS task queue: SP workers are stuck in
; NtWaitForAlertByThreadId waiting for work that was already queued.
; Alerting them causes an immediate resample of the condition variable; if
; the task flag is set they pick up the work and the game continues normally.
;
; If recovery succeeds: the stall counter resets; no dump or kill is taken.
; If recovery fails (game still stalled after RecoveryGraceSec): Action fires.
;
; 0 disables recovery (always go straight to Action). Default: 1
RecoveryAttempt = 1

; Seconds to wait after alerting threads before checking if the game recovered.
; Minimum 1, maximum 60. Default: 5
RecoveryGraceSec = 5

; What to do when either detector fires. Each detector triggers Action
; once per hang episode; if things recover, the counter resets.
;
;   log         -- just add a line to SkyMPFixes.log (non-destructive)
;   dump        -- write a mini-dump next to SkyMPFixes.log
;                  and keep running so you can decide when to close
;   kill        -- immediately TerminateProcess the game (no evidence)
;   dumpAndKill -- dump first, then kill (default; captures evidence
;                  and ends the frozen session so you can restart)
Action = dumpAndKill

; Dump profile used when Action includes "dump".
;
; 0 = small dump (default): thread stacks + modules + memory map metadata,
;     usually much smaller and sufficient for routine hang/crash triage.
; 1 = full-memory dump: includes the entire process memory, useful for deep
;     heap/object forensics but can be several GB.
FullMemoryDump = 0
